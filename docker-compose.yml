services:

  ingress:
    build: .
    container_name: ingress
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - CLASSIFIER_MODEL=llama3.2:3b
      - WORKER_MODEL=llama3.2:3b
      - CLASSIFIER_TIMEOUT=60
      - WORKER_TIMEOUT=300
      - MAX_TOKENS=256
      - LOG_LEVEL=INFO
    extra_hosts:
      # Allows the container to reach Ollama running on the host.
      # Works automatically on Docker Desktop (Mac/Windows).
      # On Linux, requires Docker 20.10+ (host-gateway is resolved automatically).
      - "host.docker.internal:host-gateway"
    networks:
      - agentic
    restart: unless-stopped

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    ports:
      - "3000:8080"
    environment:
      # Point OpenWebUI at our Ingress API instead of a real OpenAI endpoint.
      - OPENAI_API_BASE_URL=http://ingress:8000/v1
      - OPENAI_API_KEY=not-used
      # Disable Ollama's built-in connection so only the shim is used.
      - ENABLE_OLLAMA_API=false
      # Restrict CORS to the local UI origin instead of the default wildcard.
      - CORS_ALLOW_ORIGIN=http://localhost:3000
    depends_on:
      - ingress
    networks:
      - agentic
    restart: unless-stopped
    volumes:
      - openwebui_data:/app/backend/data

volumes:
  openwebui_data:

networks:
  agentic:
    driver: bridge
